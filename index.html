<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>みつけてゲーム！</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ===== ヘッダー（ゲーム中のHUD） ===== -->
    <header id="hud" class="hidden">
      <div class="hud-item">
        <span class="hud-label">ステージ</span>
        <span id="stage" class="hud-value">1 / 10</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">スコア</span>
        <span id="score" class="hud-value">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">のこり時間</span>
        <span id="time" class="hud-value">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">みつけた</span>
        <span id="found-count" class="hud-value">0 / 0</span>
      </div>
      <button id="quit-btn" class="mini-btn" title="やめる">✕</button>
    </header>

    <!-- ===== お題＆のこりリスト ===== -->
    <section id="prompt-bar" class="hidden">
      <div id="prompt">
        <span class="prompt-text">「</span>
        <span id="prompt-emoji">❓</span>
        <span id="prompt-name">？</span>
        <span class="prompt-text">」をさがそう！</span>
      </div>
      <ul id="remaining-list"></ul>
      <div id="hint-msg" class="hidden">💡 ヒント：光っているのが さがしもの だよ！</div>
    </section>

    <!-- ===== プレイフィールド ===== -->
    <main id="field" class="hidden"></main>

    <!-- ===== スタート画面 ===== -->
    <div id="start-screen" class="overlay">
      <div class="panel">
        <h1 class="title">🔍 みつけてゲーム！</h1>

        <div class="info-box">
          <p>ぜんぶで <b>10ステージ</b>！</p>
        </div>

        <button id="start-btn" class="big-btn">▶ ステージを えらぶ</button>
      </div>
    </div>

    <!-- ===== ステージ選択画面 ===== -->
    <div id="stage-select-screen" class="overlay hidden">
      <div class="panel">
        <h1 class="title">🗺️ ステージを えらぶ</h1>
        <div id="world-tabs">
          <button id="tab-front" class="tab-btn selected">おもて</button>
          <button id="tab-back" class="tab-btn" disabled>うら 🔒</button>
        </div>
        <div id="stage-grid"></div>
        <p class="hint">クリアすると つぎのステージが あそべるよ！</p>
        <button id="select-back-btn" class="big-btn secondary">← タイトルへ</button>
      </div>
    </div>

    <!-- ===== ステージクリア画面 ===== -->
    <div id="stage-clear-screen" class="overlay hidden">
      <div class="panel">
        <h1 id="stage-clear-title" class="title">🎊 ステージ クリア！</h1>
        <div class="result-stats">
          <div class="stat">
            <span class="stat-label">スコア</span>
            <span id="stage-clear-score" class="stat-value">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">タイムボーナス</span>
            <span id="stage-clear-bonus" class="stat-value">0</span>
          </div>
        </div>
        <p id="stage-clear-message" class="result-message"></p>
        <div class="result-buttons">
          <button id="next-stage-btn" class="big-btn">つぎのステージへ ▶</button>
          <button id="stage-clear-select-btn" class="big-btn secondary">🗺️ ステージせんたく</button>
        </div>
      </div>
    </div>

    <!-- ===== 結果画面（ゲームオーバー／全クリア） ===== -->
    <div id="result-screen" class="overlay hidden">
      <div class="panel">
        <h1 id="result-title" class="title">けっか</h1>
        <div class="result-stats">
          <div class="stat">
            <span class="stat-label">スコア</span>
            <span id="result-score" class="stat-value">0</span>
          </div>
          <div class="stat">
            <span class="stat-label" id="result-stat2-label">とうたつ</span>
            <span id="result-stat2" class="stat-value">0</span>
          </div>
        </div>
        <p id="result-message" class="result-message"></p>
        <div class="result-buttons">
          <button id="retry-btn" class="big-btn">🔄 もういちど</button>
          <button id="home-btn" class="big-btn secondary">🗺️ ステージせんたく</button>
        </div>
      </div>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
